name: build mottak

on:
  push:
    branches:
      - main
    paths:
      - 'mottak/**'
      - '.github/workflows/mottak.yml'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'mottak.yml'
      - '.nais/mottak.yml'
      - '.nais/mottak-dev.json'
  schedule:
    - cron: '0 3 * * 3'
      timezone: 'Europe/Oslo'
jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21.x'
          cache: 'gradle'
      - name: gradle
        run: ./gradlew :mottak:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: build docker image
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: tbd
          dockerfile: Dockerfile
          image_suffix: mottak
          docker_context: mottak
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  deployDev:
    name: deploy to dev
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/mottak.yml
          VARS: .nais/mottak-dev.json
          IMAGE: ${{ needs.build.outputs.image }}
